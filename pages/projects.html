<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Projects page for Saeed Amiri portfolio." />
    <title>Saeed Amiri | Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/main.css?v=20260404-2" />
    <style>
      #brandName {
        font-family: "Pinyon Script", "Brush Script MT", cursive !important;
        font-size: 2rem !important;
        font-weight: 400 !important;
        letter-spacing: 0.01em !important;
      }
    </style>
  </head>
  <body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand" id="brandName">Saeed Amiri</div>
      <nav class="controls" aria-label="Language and actions">
        <a class="chip active" href="projects.html">Ongoing Projects</a>
        <a class="chip" href="../index.html">CV</a>
      </nav>
    </header>

    <main class="layout" id="projectsRoot">
      <aside class="profile-card reveal">
        <img
          id="projectProfilePhoto"
          src="../assets/profile-placeholder.svg?v=20260404-1"
          alt="Profile photo"
          class="profile-photo"
        />
        <h1 id="projectOwnerName">Saeed Amiri</h1>
        <p class="headline" id="projectOwnerHeadline">Project Portfolio</p>
        <p class="meta" id="projectOwnerMeta">ML, MLOps, and Scientific Computing</p>
        <a class="contact-link" id="projectContactEmail" href="mailto:email@example.com">email@example.com</a>
        <a class="contact-link" id="projectLinkedin" href="https://www.linkedin.com/in/saeed-amiri-71556391/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a class="contact-link" id="projectGithub" href="https://github.com/saeed-amiri" target="_blank" rel="noopener noreferrer">GitHub</a>
      </aside>

      <section class="content reveal" id="projectsContent"></section>

      <aside class="section-rail" aria-label="Project section navigation">
        <ul id="projectRailList"></ul>
      </aside>
    </main>

    <footer class="footer">
      <small id="projectFooterText">Ongoing projects and technical work in progress.</small>
    </footer>

    <div class="modal-backdrop hidden" id="detailModalBackdrop" aria-hidden="true">
      <div class="detail-modal" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="detailModalTitle">
        <button class="modal-close" id="detailModalClose" type="button" aria-label="Close detail view">x</button>
        <h3 id="detailModalTitle"></h3>
        <div id="detailModalContent"></div>
      </div>
    </div>

    <div class="image-lightbox-backdrop hidden" id="imageLightboxBackdrop" aria-hidden="true">
      <div class="image-lightbox" id="imageLightbox" role="dialog" aria-modal="true" aria-label="Expanded image view">
        <button class="image-lightbox-close" id="imageLightboxClose" type="button" aria-label="Close image view">x</button>
        <img id="imageLightboxImg" src="" alt="Expanded detail image" />
      </div>
    </div>

    <script type="module" src="../scripts/projects.js"></script>
  </body>
</html>
