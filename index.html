<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Saeed Amiri portfolio and CV with bilingual content and PDF export."
    />
    <title>Saeed Amiri | Portfolio CV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand" id="brandName">Saeed Amiri</div>
      <nav class="controls" aria-label="Language and actions">
        <a class="chip" href="pages/projects.html">Projects</a>
        <button class="chip" id="langEn" type="button">English</button>
        <button class="chip" id="langDe" type="button">Deutsch</button>
        <button class="chip accent" id="downloadPdf" type="button">Download PDF</button>
      </nav>
    </header>

    <main class="layout" id="cvRoot">
      <aside class="profile-card reveal">
        <img
          id="profilePhoto"
          src="assets/profile-placeholder.svg"
          alt="Profile photo"
          class="profile-photo"
        />
        <h1 id="fullName">Saeed Amiri</h1>
        <p id="headline" class="headline"></p>
        <p id="location" class="meta"></p>
        <a id="contactEmail" class="contact-link" href="#">email@example.com</a>
        <a id="linkedin" class="contact-link" href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a id="github" class="contact-link" href="#" target="_blank" rel="noopener noreferrer">GitHub</a>
      </aside>

      <section class="content reveal" id="contentRoot">
        <section class="panel" id="bioSection" data-section-key="bio" data-detail-key="bio">
          <h2 id="bioTitle"></h2>
          <p id="bioText"></p>
        </section>

        <section class="panel" id="experienceSection" data-section-key="experience" data-detail-key="experience">
          <h2 id="experienceTitle"></h2>
          <div id="experienceList" class="timeline"></div>
        </section>

        <section class="panel" id="trainingsSection" data-section-key="trainings" data-detail-key="trainings">
          <h2 id="trainingsTitle"></h2>
          <div id="trainingsList" class="timeline"></div>
        </section>

        <section class="panel" id="educationSection" data-section-key="education" data-detail-key="education">
          <h2 id="educationTitle"></h2>
          <div id="educationList" class="timeline"></div>
        </section>

        <section class="panel" id="skillsSection" data-section-key="skills" data-detail-key="skills">
          <h2 id="skillsTitle"></h2>
          <div id="skillsList" class="skills-list"></div>
        </section>

        <section class="panel" id="certSection" data-section-key="certifications" data-detail-key="certifications">
          <h2 id="certTitle"></h2>
          <div id="certGrid" class="cert-grid"></div>
        </section>
      </section>

      <aside class="section-rail" id="sectionRail" aria-label="Section navigation">
        <ul id="sectionRailList"></ul>
      </aside>
    </main>

    <footer class="footer">
      <small id="footerText"></small>
    </footer>

    <div class="modal-backdrop hidden" id="detailModalBackdrop" aria-hidden="true">
      <div class="detail-modal" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="detailModalTitle">
        <button class="modal-close" id="detailModalClose" type="button" aria-label="Close detail view">x</button>
        <h3 id="detailModalTitle"></h3>
        <div id="detailModalContent"></div>
      </div>
    </div>

    <script type="module" src="scripts/main.js"></script>
  </body>
</html>
