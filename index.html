<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Saeed Amiri portfolio and CV with bilingual content and PDF export."
    />
    <title>Saeed Amiri | Portfolio CV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand" id="brandName">Saeed Amiri</div>
      <nav class="controls" aria-label="Language and actions">
        <button class="chip" id="langEn" type="button">English</button>
        <button class="chip" id="langDe" type="button">Deutsch</button>
        <button class="chip accent" id="downloadPdf" type="button">Download PDF</button>
      </nav>
    </header>

    <main class="layout" id="cvRoot">
      <aside class="profile-card reveal">
        <img
          id="profilePhoto"
          src="assets/profile-placeholder.svg"
          alt="Profile photo"
          class="profile-photo"
        />
        <h1 id="fullName">Saeed Amiri</h1>
        <p id="headline" class="headline"></p>
        <p id="location" class="meta"></p>
        <a id="contactEmail" class="contact-link" href="#">email@example.com</a>
        <a id="linkedin" class="contact-link" href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a id="github" class="contact-link" href="#" target="_blank" rel="noopener noreferrer">GitHub</a>
      </aside>

      <section class="content reveal">
        <section class="panel" id="bioSection">
          <h2 id="bioTitle"></h2>
          <p id="bioText"></p>
        </section>

        <section class="panel" id="featuredSection">
          <h2 id="featuredTitle"></h2>
          <div class="quick-links">
            <a id="thesisLink" class="action-link" target="_blank" rel="noopener noreferrer"></a>
            <a id="mlopsLink" class="action-link" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </section>

        <section class="panel" id="experienceSection">
          <h2 id="experienceTitle"></h2>
          <div id="experienceList" class="timeline"></div>
        </section>

        <section class="panel" id="educationSection">
          <h2 id="educationTitle"></h2>
          <div id="educationList" class="timeline"></div>
        </section>

        <section class="panel" id="certSection">
          <h2 id="certTitle"></h2>
          <div id="certGrid" class="cert-grid"></div>
        </section>
      </section>
    </main>

    <footer class="footer">
      <small id="footerText"></small>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
